<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MINT NETSCOUT — SIGINT PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   MINT NETSCOUT — SOVEREIGN DARK MILITARY INTELLIGENCE TERMINAL
   Aesthetic: SIGINT / Cold-War Supercomputer / Deep Space Ops
   Fonts: Orbitron (display) + Share Tech Mono (data) + Exo 2 (body)
═══════════════════════════════════════════════════════════════ */
:root {
  /* Core Palette */
  --void:     #020408;
  --abyss:    #040810;
  --deep:     #06101c;
  --surface:  #081420;
  --raised:   #0c1e30;
  --glass:    rgba(8,20,32,0.85);

  /* Neon Accents */
  --mint:     #00ffaa;
  --mint-d:   rgba(0,255,170,0.12);
  --mint-g:   rgba(0,255,170,0.3);
  --mint-dim: #00c880;
  --cyan:     #00d4ff;
  --cyan-d:   rgba(0,212,255,0.1);
  --gold:     #ffcc00;
  --gold-d:   rgba(255,204,0,0.1);
  --red:      #ff2255;
  --red-d:    rgba(255,34,85,0.12);
  --orange:   #ff7700;
  --purple:   #9d50ff;

  /* Borders */
  --b1: rgba(0,255,170,0.08);
  --b2: rgba(0,255,170,0.2);
  --b3: rgba(0,255,170,0.45);

  /* Text */
  --t0: #f0f8ff;
  --t1: #a8c8e8;
  --t2: #506880;
  --t3: #283848;

  /* Fonts */
  --f-hud:  'Orbitron', sans-serif;
  --f-data: 'Share Tech Mono', monospace;
  --f-body: 'Exo 2', sans-serif;

  --ease:  cubic-bezier(0.4, 0, 0.2, 1);
  --ease2: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }

body {
  background: var(--void);
  color: var(--t1);
  font-family: var(--f-body);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* ══════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════ */
@keyframes bootFade    { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
@keyframes typeIn      { from{width:0} to{width:100%} }
@keyframes blink       { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp      { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn      { from{opacity:0} to{opacity:1} }
@keyframes slideRight  { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideDown   { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse       { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes ping        { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2.6);opacity:0} }
@keyframes sweep       { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes scanline    { 0%{top:-2px;opacity:0} 5%{opacity:.6} 95%{opacity:.3} 100%{top:100%;opacity:0} }
@keyframes mintGlow    { 0%,100%{box-shadow:0 0 8px var(--mint-g)} 50%{box-shadow:0 0 24px var(--mint-g),0 0 48px rgba(0,255,170,0.1)} }
@keyframes redGlow     { 0%,100%{box-shadow:0 0 6px rgba(255,34,85,.4)} 50%{box-shadow:0 0 18px rgba(255,34,85,.7),0 0 36px rgba(255,34,85,.2)} }
@keyframes gridMove    { from{background-position:0 0} to{background-position:60px 60px} }
@keyframes numberCount { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes borderFlow  { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
@keyframes warSpin     { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes shimmer     { 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.5} }
@keyframes alertFlash  { 0%,100%{background:transparent} 50%{background:rgba(255,34,85,0.04)} }
@keyframes bootLine    { from{transform:scaleX(0)} to{transform:scaleX(1)} }

/* ══════════════════════════════════════════
   BOOT SCREEN
══════════════════════════════════════════ */
#boot {
  position: fixed; inset: 0;
  background: var(--void);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity .6s ease;
}
#boot.hidden { opacity: 0; pointer-events: none; }

.boot-logo {
  font-family: var(--f-hud);
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  color: var(--mint);
  letter-spacing: 8px;
  text-transform: uppercase;
  text-shadow: 0 0 40px var(--mint-g), 0 0 80px rgba(0,255,170,0.15);
  margin-bottom: 8px;
}
.boot-sub {
  font-family: var(--f-data);
  font-size: 10px;
  color: var(--t2);
  letter-spacing: 4px;
  margin-bottom: 48px;
}
.boot-bar-wrap {
  width: 320px; height: 2px;
  background: var(--b1);
  border-radius: 1px;
  overflow: hidden;
  margin-bottom: 20px;
}
.boot-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--cyan));
  border-radius: 1px;
  transition: width .15s linear;
  box-shadow: 0 0 12px var(--mint-g);
}
.boot-log {
  font-family: var(--f-data);
  font-size: 10px;
  color: var(--t2);
  letter-spacing: 1px;
  height: 14px;
  overflow: hidden;
}
.boot-line {
  width: 0; overflow: hidden; white-space: nowrap;
  animation: typeIn .4s steps(40) forwards;
}

/* ══════════════════════════════════════════
   SHELL LAYOUT
══════════════════════════════════════════ */
.shell {
  display: grid;
  grid-template: 58px 1fr / 220px 1fr;
  grid-template-areas: "side top" "side main";
  height: 100vh;
  background:
    radial-gradient(ellipse 120% 60% at 50% -15%, rgba(0,255,170,0.04) 0%, transparent 60%),
    var(--void);
  position: relative;
}

/* Moving grid bg */
.shell::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,170,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,170,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 8s linear infinite;
  pointer-events: none; z-index: 0;
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
.side {
  grid-area: side;
  background: var(--abyss);
  border-right: 1px solid var(--b1);
  display: flex; flex-direction: column;
  z-index: 10;
  position: relative;
  overflow: hidden;
}
.side::after {
  content: '';
  position: absolute; top: 0; right: -1px; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--mint), transparent);
  opacity: .3;
}

.brand-block {
  padding: 22px 20px 20px;
  border-bottom: 1px solid var(--b1);
  position: relative;
}
.brand-logo {
  font-family: var(--f-hud);
  font-size: 15px;
  font-weight: 900;
  color: var(--mint);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 0 0 20px var(--mint-g);
  line-height: 1;
  margin-bottom: 4px;
}
.brand-tagline {
  font-family: var(--f-data);
  font-size: 8px;
  color: var(--t3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.brand-ver {
  position: absolute; top: 22px; right: 16px;
  font-family: var(--f-data);
  font-size: 8px;
  color: var(--mint-dim);
  padding: 2px 5px;
  border: 1px solid var(--b1);
  border-radius: 3px;
  letter-spacing: 1px;
}

.nav-section-label {
  padding: 16px 20px 6px;
  font-family: var(--f-hud);
  font-size: 7px;
  color: var(--t3);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: var(--f-body);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--t2);
  letter-spacing: .5px;
  border-left: 2px solid transparent;
  transition: all .18s var(--ease);
  user-select: none;
  position: relative;
}
.nav-item:hover { color: var(--t1); background: rgba(0,255,170,0.04); }
.nav-item.on {
  color: var(--mint);
  border-left-color: var(--mint);
  background: var(--mint-d);
  text-shadow: 0 0 12px var(--mint-g);
}
.nav-item.on .nav-glyph { color: var(--mint); text-shadow: 0 0 8px var(--mint-g); }
.nav-glyph { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-family: var(--f-data);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 8px;
  min-width: 16px;
  text-align: center;
  font-weight: 700;
  box-shadow: 0 0 8px rgba(255,34,85,.5);
  animation: redGlow 2s infinite;
}

.side-bottom {
  margin-top: auto;
  border-top: 1px solid var(--b1);
  padding: 14px 20px;
}
.connection-row {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--f-data);
  font-size: 9px;
  color: var(--t2);
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.conn-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 8px var(--mint-g);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}
.conn-dot.off { background: var(--red); box-shadow: 0 0 8px rgba(255,34,85,.5); }

/* EXIT BUTTON */
.exit-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 14px;
  background: transparent;
  border: 1px solid rgba(255,34,85,0.3);
  border-radius: 6px;
  color: var(--red);
  font-family: var(--f-hud);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s var(--ease);
}
.exit-btn:hover {
  background: var(--red-d);
  border-color: var(--red);
  box-shadow: 0 0 16px rgba(255,34,85,.25);
  text-shadow: 0 0 8px rgba(255,34,85,.7);
}
.exit-btn:active { transform: scale(.97); }

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.top {
  grid-area: top;
  background: var(--abyss);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 0;
  z-index: 10;
  position: relative;
}
.top::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,170,.25), transparent);
}

.top-metrics { display: flex; gap: 0; flex: 1; }
.top-metric {
  padding: 0 20px;
  border-right: 1px solid var(--b1);
  display: flex; flex-direction: column; gap: 2px;
}
.top-metric:first-child { border-left: 1px solid var(--b1); }
.top-metric-val {
  font-family: var(--f-hud);
  font-size: 20px;
  font-weight: 800;
  color: var(--mint);
  line-height: 1;
  text-shadow: 0 0 12px var(--mint-g);
  animation: numberCount .4s var(--ease2);
}
.top-metric-lbl {
  font-family: var(--f-data);
  font-size: 7.5px;
  color: var(--t3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.clock {
  font-family: var(--f-data);
  font-size: 12px;
  color: var(--t2);
  letter-spacing: 1.5px;
  min-width: 72px; text-align: right;
}

/* Status pill */
.status-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid;
  font-family: var(--f-hud);
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.status-chip.live { border-color: rgba(0,255,170,.3); color: var(--mint); background: var(--mint-d); }
.status-chip.dead { border-color: rgba(255,34,85,.3); color: var(--red); background: var(--red-d); }
.chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }

/* SCAN BUTTON */
.scan-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 20px;
  background: transparent;
  border: 1px solid var(--mint);
  border-radius: 6px;
  color: var(--mint);
  font-family: var(--f-hud);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s var(--ease);
  position: relative;
  overflow: hidden;
}
.scan-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,255,170,0.08), transparent);
  transform: translateX(-100%);
  transition: transform .5s var(--ease);
}
.scan-btn:hover::before { transform: translateX(100%); }
.scan-btn:hover { background: var(--mint-d); box-shadow: 0 0 20px var(--mint-g); }
.scan-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  animation: mintGlow 1.5s infinite;
}
.scan-btn:active { transform: scale(.97); }
.scan-icon { font-size: 11px; }

/* ══════════════════════════════════════════
   MAIN AREA
══════════════════════════════════════════ */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; z-index: 1;
}

/* Scan progress banner */
.scan-banner {
  display: flex; align-items: center; gap: 14px;
  padding: 11px 16px;
  background: rgba(255,204,0,0.04);
  border: 1px solid rgba(255,204,0,0.2);
  border-radius: 8px;
  animation: slideDown .3s var(--ease2);
}
.scan-banner-text {
  font-family: var(--f-hud);
  font-size: 9.5px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: pulse 1.2s infinite;
  flex: 1;
}
.scan-progress-bar {
  flex: 2; height: 2px;
  background: var(--b1);
  border-radius: 1px; overflow: hidden;
}
.scan-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--cyan), var(--gold), var(--mint));
  background-size: 200%;
  animation: borderFlow 1.5s linear infinite;
  border-radius: 1px;
}
.scan-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,204,0,.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: warSpin .8s linear infinite;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   PANELS
══════════════════════════════════════════ */
.panel {
  background: var(--surface);
  border: 1px solid var(--b1);
  border-radius: 12px;
  overflow: hidden;
  animation: fadeUp .35s var(--ease2);
  position: relative;
}
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--mint), transparent);
  opacity: .25;
}
.panel-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--b1);
  background: rgba(0,0,0,0.25);
}
.panel-title {
  font-family: var(--f-hud);
  font-size: 9px;
  font-weight: 700;
  color: var(--t0);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  flex: 1;
}
.panel-body { padding: 14px 16px; }

/* Panel accent lines */
.pa-mint  { border-top: 2px solid var(--mint); }
.pa-gold  { border-top: 2px solid var(--gold); }
.pa-red   { border-top: 2px solid var(--red); }
.pa-cyan  { border-top: 2px solid var(--cyan); }
.pa-purple{ border-top: 2px solid var(--purple); }

/* ══════════════════════════════════════════
   KPI CARDS
══════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.kpi-card {
  background: var(--raised);
  border: 1px solid var(--b1);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s var(--ease);
  cursor: default;
}
.kpi-card:hover { border-color: var(--b2); transform: translateY(-2px); }
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--kc, var(--mint));
  opacity: .9;
}
.kpi-card::after {
  content: '';
  position: absolute; top: -20px; right: -20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, var(--kc, var(--mint)) 0%, transparent 70%);
  opacity: .04;
}
.kpi-icon { font-size: 22px; margin-bottom: 8px; }
.kpi-val {
  font-family: var(--f-hud);
  font-size: 32px;
  font-weight: 900;
  color: var(--t0);
  line-height: 1;
  animation: numberCount .5s var(--ease2);
}
.kpi-lbl {
  font-family: var(--f-data);
  font-size: 8px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
}
.kpi-sub {
  font-family: var(--f-data);
  font-size: 9.5px;
  color: var(--t2);
  margin-top: 6px;
}

/* ══════════════════════════════════════════
   RADAR
══════════════════════════════════════════ */
.radar-wrap { display: flex; align-items: center; gap: 0; }
.radar-canvas {
  position: relative;
  width: 200px; height: 200px;
  flex-shrink: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,170,0.04) 0%, transparent 70%);
  border: 1px solid rgba(0,255,170,0.1);
}
.r-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(0,255,170,0.07);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
.r-cross::before,.r-cross::after {
  content:''; position:absolute; background: rgba(0,255,170,0.06);
}
.r-cross::before { top:50%;left:0;right:0;height:1px; }
.r-cross::after  { left:50%;top:0;bottom:0;width:1px; }
.r-sweep {
  position:absolute; inset:0; border-radius:50%; overflow:hidden;
}
.r-arm {
  position:absolute; top:50%; left:50%;
  width:50%; height:1px;
  transform-origin: 0 50%;
  background: linear-gradient(90deg, rgba(0,255,170,.95), transparent);
  animation: sweep 4s linear infinite;
  filter: drop-shadow(0 0 3px var(--mint));
}
.r-dot {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 10px var(--mint-g);
  transform: translate(-50%,-50%);
  cursor: pointer;
  transition: transform .2s var(--ease);
  z-index: 2;
}
.r-dot:hover { transform: translate(-50%,-50%) scale(1.7); }
.r-dot::after {
  content:''; position:absolute; inset:-4px;
  border-radius:50%; border:1px solid var(--mint);
  animation: ping 3s ease-out infinite; opacity:0;
}
.r-dot.gw { background: var(--gold); box-shadow: 0 0 10px rgba(255,204,0,.6); }
.r-dot.gw::after { border-color: var(--gold); }
.r-dot.offline { background: var(--t3); box-shadow: none; }
.r-dot.offline::after { display: none; }
.r-center {
  position: absolute; top:50%; left:50%;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 16px var(--mint-g);
  transform: translate(-50%,-50%);
  z-index: 3;
}

.radar-list {
  flex: 1; padding: 8px 16px;
  max-height: 200px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 4px;
}
.rl-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 6px; border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
}

(function() {
  const bar = document.getElementById('boot-bar');
  const log = document.getElementById('boot-log');
  const msgs = [
    'INITIALIZING KERNEL MODULES...',
    'LOADING THREAT INTELLIGENCE DATABASE...',

  ];
  let i = 0;
  function tick() {
    if (i >= msgs.length) {
      // Safety: Hide boot screen after 5 seconds even if React fails
      setTimeout(() => {
        const boot = document.getElementById('boot');
        if (boot && !boot.classList.contains('hidden')) {
          console.warn('React failed to hide boot screen, triggering fallback hide.');
          boot.classList.add('hidden');

  ago: ts => {

// ─── Hook ─────────────────────────────────────────────
function useNetScout() {
  const [devices,  setDevices]  = useState([]);
  const [unsafe,   setUnsafe]   = useState([]);
  const [stats,    setStats]    = useState({ total:0, online:0, trusted:0 });
  const [alerts,   setAlerts]   = useState([]);
  const [status,   setStatus]   = useState(null);
  const [latency,  setLatency]  = useState([]);
  const [scanning, setScanning] = useState(false);
  const [scanMsg,  setScanMsg]  = useState('');
  const [connected,setConnected]= useState(false);
  const sock = useRef(null);

  const fetchAll = useCallback(async () => {
    try {
      const [d, u, s] = await Promise.all([
        fetch('/api/devices').then(r => r.json()),
        fetch('/api/intel/unsafe').then(r => r.json()),
        fetch('/api/status').then(r => r.json()),
      ]);
      setDevices(d.devices || []);
      setUnsafe(u.unsafe_zone || []);
      setStats(s.device_stats || { total:0, online:0, trusted:0 });
      setStatus(s);
    } catch(e) { console.warn('fetch error', e); }
  }, []);

  useEffect(() => {
    if (typeof io === 'undefined') {
      console.error('Socket.IO not loaded. WebSocket features will be disabled.');
      setConnected(false);
      fetchAll();
      return;
    }
    const s = io(window.location.origin, {
      transports: ['websocket', 'polling'],
      reconnectionDelay: 3000,
      reconnectionDelayMax: 10000,
      ping_timeout: 60,
      ping_interval: 25,
    });
    sock.current = s;
    s.on('connect',    () => { setConnected(true);  fetchAll(); });
    s.on('disconnect', () => setConnected(false));
    s.on('scan_progress', d => { setScanning(true);  setScanMsg(d.message || 'Scanning…'); });
    s.on('scan_complete', d => {
      setScanning(false); setScanMsg('');
      if (d.devices) setDevices(d.devices);
      else fetchAll();
    });
    s.on('scan_error', () => { setScanning(false); setScanMsg(''); });
    s.on('alert', a => setAlerts(p => [a, ...p].slice(0,120)));
    fetchAll();
    const poll = setInterval(fetchAll, 20000);
    return () => { s.disconnect(); clearInterval(poll); };
  }, [fetchAll]);

  const triggerScan = useCallback(async (aggressive = false) => {
    setScanning(true); 
    setScanMsg(aggressive ? 'Initiating AGGRESSIVE deep discovery…' : 'Initiating standard discovery…');
    try { 
      await fetch('/api/scan', { 
        method:'POST', headers:{'Content-Type':'application/json'}, 
        body: JSON.stringify({ aggressive }) 
      }); 
    }
    catch(e) { setScanning(false); }
  }, []);

  const trustDevice = useCallback(async (mac, trusted) => {
    try {
      await fetch(`/api/devices/${encodeURIComponent(mac)}/trust`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ trusted }),
      });
      fetchAll();
    } catch(e) {}
  }, [fetchAll]);

  const removeDevice = useCallback(async (mac) => {
    try {
      await fetch(`/api/devices/${encodeURIComponent(mac)}`, { method:'DELETE' });
      fetchAll();
    } catch(e) {}
  }, [fetchAll]);

  const blockDevice = useCallback(async (mac, blocked) => {
    try {
      await fetch(`/api/devices/${encodeURIComponent(mac)}/block`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ blocked }),
      });
      fetchAll();
    } catch(e) {}
  }, [fetchAll]);

  const investigateDevice = useCallback(async (mac) => {
    try {
      setScanning(true); setScanMsg('Investigating specific asset...');
      const res = await fetch(`/api/devices/${encodeURIComponent(mac)}/investigate`, { method:'POST' });
      const data = await res.json();
      setScanning(false); setScanMsg('');
      fetchAll();
      return data;
    } catch(e) { setScanning(false); return null; }
  }, [fetchAll]);

  const ackAlert = useCallback(a => setAlerts(p => p.map(x => x === a ? {...x, acked:true} : x)), []);

  const checkUpdates = useCallback(async () => {
    try {
      const res = await fetch('/api/update/check');
      return await res.json();
    } catch(e) { return null; }
  }, []);

  const addDeviceManual = useCallback(async (data) => {
    try {
      const res = await fetch('/api/devices/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data),
      });
      fetchAll();
      return await res.json();
    } catch(e) { return {success:false, error: e.message}; }
  }, [fetchAll]);

  return { devices, unsafe, stats, alerts, status, latency, scanning, scanMsg, connected, triggerScan, trustDevice, removeDevice, blockDevice, investigateDevice, ackAlert, checkUpdates, addDeviceManual, refresh: fetchAll };
}

// ─── Radar ────────────────────────────────────────────
function Radar({ devices, scanning, onSelect }) {
  const online = devices.filter(d => d.is_online);
  const dots = useMemo(() => online.slice(0,20).map((d,i) => {
    const angle = (i / Math.max(online.length, 1)) * Math.PI * 2 - Math.PI/2 + (i % 4) * 0.22;
    const r = 20 + (i % 5) * 12;
    return { x: 50 + r * Math.cos(angle), y: 50 + r * Math.sin(angle), d };
  }), [online]);

  return React.createElement('div', { className:'radar-wrap' },
    React.createElement('div', { className:'radar-canvas' },
      [80,60,40,20].map(s => React.createElement('div',{ key:s, className:'r-ring', style:{ width:s+'%', height:s+'%' } })),
      React.createElement('div', { className:'r-cross', style:{ position:'absolute', inset:0, pointerEvents:'none' } }),
      scanning && React.createElement('div', { className:'r-sweep' }, React.createElement('div', { className:'r-arm' })),
      React.createElement('div', { className:'r-center' }),
      dots.map(({x,y,d}) =>
        React.createElement('div', {
          key: d.mac, className:'r-dot',
          style:{ left:x+'%', top:y+'%' },
          title: d.alias || d.hostname || d.ip,
          onClick: () => onSelect(d),
        })
      )
    ),
    React.createElement('div', { className:'radar-list' },
      online.slice(0,9).map(d =>
        React.createElement('div', { key:d.mac, className:'rl-row', onClick:()=>onSelect(d) },
          React.createElement('span', { className:'rl-icon' }, ICONS(d)),
          React.createElement('div', { className:'rl-info' },
            React.createElement('div', { className:'rl-name' }, d.alias || d.hostname || d.ip),
            React.createElement('div', { className:'rl-ip' }, d.ip)
          ),
          React.createElement('span', { className:'live-dot' })
        )
      ),
      online.length === 0 && React.createElement('div', { className:'empty', style:{padding:20,border:'none'} }, 'NO LIVE ASSETS')
    )
  );
}

  return React.createElement('div', { className:'overlay', onClick: e => e.target === e.currentTarget && onClose() },
    React.createElement('div', { className:'modal' },
      React.createElement('div', { className:'modal-hdr' },
        React.createElement('div', { className:'modal-device-icon' }, ICONS(dev)),
        React.createElement('div', null,
          React.createElement('div', { className:'modal-title' }, dev.alias || dev.hostname || dev.ip),
          React.createElement('div', { className:'modal-sub' }, (dev.vendor || 'Unknown Vendor') + ' · ' + FMT.mac(dev.mac))
        ),
        React.createElement('button', { className:'modal-close', onClick:onClose }, '✕')
      ),
      React.createElement('div', { className:'modal-body' },
        React.createElement('div', { className:'detail-grid' },
          [
            ['IP Address',   dev.ip || '—'],
            ['MAC Address',  FMT.mac(dev.mac)],
            ['Alias',        dev.alias || '—'],
            ['Hostname',     dev.hostname || '—'],
            ['Vendor / OUI', dev.vendor || '—'],
            ['OS Hint',      dev.os_hint || '—'],
            ['Device Type',  dev.device_type || '—'],
            ['First Seen',   FMT.time(dev.first_seen)],
            ['Last Seen',    FMT.ago(dev.last_seen)],
            ['Latency',      dev.latency_ms ? dev.latency_ms.toFixed(1) + ' ms' : '—'],
            ['Traffic IN',   (dev.traffic_in || 0).toFixed(2) + ' MB'],
            ['Traffic OUT',  (dev.traffic_out || 0).toFixed(2) + ' MB'],
          ].map(([l,v]) =>
            React.createElement('div', { key:l, className:'detail-row' },
              React.createElement('div', { className:'detail-lbl' }, l),
              React.createElement('div', { className:'detail-val' }, v)
            )
          )
        ),
        React.createElement('div', { className:'detail-row' },
          React.createElement('div', { className:'detail-lbl' }, 'Trust Status'),
          React.createElement('span', { className:`badge ${dev.is_trusted ? 'badge-trusted' : 'badge-warn'}` },
            dev.is_trusted ? '✓ TRUSTED' : '⚠ UNVERIFIED'
          )
        ),
        ports.length > 0 && React.createElement('div', { className:'detail-row' },
          React.createElement('div', { className:'detail-lbl' }, 'Open Ports'),
          React.createElement('div', { className:'port-row', style:{marginTop:5} },
            ports.map(p => React.createElement('span', { key:p, className:`pchip${HOT_PORTS.includes(+p)?' hot':''}` }, p))
          )
        ),
        React.createElement('div', { className:'action-row' },
          React.createElement('button', { className:'btn btn-mint', onClick:() => onInvestigate(dev.mac) }, '🔍 Investigate'),
          React.createElement('button', { className:`btn ${dev.is_trusted ? 'btn-red' : 'btn-gold'}`, onClick:() => onBlock(dev.mac, dev.is_trusted) }, 
            dev.is_trusted ? '🚫 Block Device' : '🔓 Unblock Device'
          ),
          React.createElement('button', { className:'btn btn-red', style:{marginLeft:'auto'}, onClick:() => { if(confirm('Remove device?')) { onRemove(dev.mac); onClose(); } } }, '🗑 Remove')
        )
      )
    )
  );
}

// ─── Exit Confirm ─────────────────────────────────────
function ExitModal({ onConfirm, onCancel }) {

// ─── Tooltip ──────────────────────────────────────────
function ChartTip({ active, payload }) {
  if (!active || !payload?.length) return null;
  return React.createElement('div', {
    style:{ background:'var(--surface)', border:'1px solid var(--b2)', borderRadius:6, padding:'5px 10px',

}

function App() {
  const ns = useNetScout();

  const [newDev, setNewDev] = useState({ ip: '', mac: '', hostname: '', type: 'unknown' });

  // Boot hide
  useEffect(() => {
    const boot = document.getElementById('boot');

      if (boot) boot.classList.add('hidden');
      setTimeout(() => { if (boot) boot.style.display = 'none'; }, 700);
    }, 2400);
    return () => clearTimeout(t);
  }, []);

  // Clock
  useEffect(() => {
    const t = () => setClock(new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    t(); const id = setInterval(t, 1000); return () => clearInterval(id);
  }, []);

  const handleUpdateCheck = async () => {
    setScanMsg('Checking for system updates...');

    setScanMsg('');

  const handleApplyUpdate = async () => {
    setUpdateInfo(null);

    setTimeout(() => {
      setScanning(false);
      setScanMsg('');

      fetchAll();

  const handleAddDevice = async () => {
    const res = await addDeviceManual(newDev);

  const online  = devices.filter(d => d.is_online);

    return mq && mf;

          el('div', { className:'panel-hdr' },
            el('span', { className:'panel-title' }, 'Asset Registry'),
            el('span', { className:'tag tag-mint' }, filtered.length + ' ASSETS')
          ),
          el('div', { style:{padding:'12px 14px', borderBottom:'1px solid var(--b1)'} },
            el('div', { className:'filter-row' },
              el('input', { className:'search-input', placeholder:'Search IP, MAC, hostname, alias…', value:search, onChange:e=>setSearch(e.target.value) }),
              [['all','All'],['online','● Online'],['offline','○ Offline'],['trusted','✓ Trusted'],['unverified','⚠ Unverified']].map(([id,lbl]) =>
                el('button', { key:id, className:`filter-btn${filter===id?' on':''}`, onClick:()=>setFilter(id) }, lbl)
              )
            )
          ),
          el('div', { className:'tbl-scroll' },
            el('table', { className:'tbl' },
              el('thead', null, el('tr', null,
                ['','Asset','IP Address','MAC','Alias','Method','Trust','Status','Last Seen'].map(h => el('th', {key:h}, h))
              )),
              el('tbody', null,
                filtered.map(d => {
                  const ports = Array.isArray(d.open_ports) ? d.open_ports.map(p => typeof p==='object'?p.port:p) : [];
                  return el('tr', { key:d.mac, onClick:()=>setSelected(d), className:selected?.mac===d.mac?'sel':'' },
                    el('td', null, el('span', { style:{fontSize:18} }, ICONS(d))),
                    el('td', null,
                      el('div', { className:'dev-name' }, d.alias || d.hostname || d.ip || 'UNKNOWN'),
                      el('div', { className:'dev-vendor' }, d.vendor || '—')
                    ),
                    el('td', null, el('span', { className:'mono' }, d.ip || '—')),
                    el('td', null, el('span', { className:'mono xs' }, FMT.mac(d.mac))),
                    el('td', null, el('span', { className:'mono xs' }, d.alias || '—')),
                    el('td', null, el('span', { className:'xs' }, (d.discovery_method || '—').toUpperCase())),
                    el('td', null, el('span', { className:`badge ${d.is_trusted ? 'badge-trusted':'badge-warn'}` }, d.is_trusted ? '✓ TRUSTED':'⚠ UNVERIFIED')),
                    el('td', null, el('span', { className:`sdot ${d.is_online?'up':'down'}` })),
                    el('td', null, el('span', { className:'xs' }, FMT.ago(d.last_seen)))
                  );
                })
              )
            ),
            filtered.length === 0 && el('div', { className:'empty', style:{margin:20} }, 'NO ASSETS MATCH FILTER')
          )
        ),

        // ══ THREATS ══
        view === 'threats' && el(React.Fragment, null,
          el('div', { className:'panel pa-red' },
            el('div', { className:'panel-hdr' },
              el('span', { className:'panel-title' }, '☣ Threat Intelligence Zone'),
              el('span', { className:'tag tag-red' }, unsafe.length + ' ACTIVE THREATS')
            ),
            el('div', { className:'panel-body' },
              unsafe.length === 0 && el('div', { className:'empty' }, 'NO MALICIOUS ACTIVITY DETECTED IN ACTIVE ASSET TRAFFIC'),
              unsafe.map((u,i) => el('div', { key:i, className:'threat-row' },
                el('div', { className:'threat-icon' }, '⚠️'),
                el('div', { style:{flex:1} },
                  el('div', { className:'threat-name' }, 'REAL THREAT: ' + u.threat),
                  el('div', { className:'threat-sub' },
                    'Source: ' + (u.device?.ip || '—') + ' [' + (u.device?.hostname || 'UNKNOWN') + ']'
                  ),
                  el('button', { 
                    className:'btn btn-mint', 
                    style:{marginTop:10,fontSize:7,padding:'4px 10px'},
                    onClick:() => { setSelected(u.device); setView('dashboard'); }
                  }, '🔍 INVESTIGATE ASSET')
                ),
                el('div', { className:'xs' }, FMT.time(u.at))
              ))
            )
          )
        ),

        // ══ ALERTS ══
        view === 'alerts' && el('div', { className:'panel pa-red' },
          el('div', { className:'panel-hdr' },
            el('span', { className:'panel-title' }, 'Alert Log'),
            unack.length > 0 && el('span', { className:'tag tag-red' }, unack.length + ' UNACKNOWLEDGED')
          ),
          el('div', { className:'panel-body' },
            alerts.length === 0 && el('div', { className:'empty' }, 'NO ALERTS RECORDED'),
            alerts.map((a,i) => {
              const col = SEVERITY_COLOR[a.severity] || '#00ffaa';
              return el('div', { key:i, className:`alert-item${a.acked?' acked':''}` },
                el('div', { className:'alert-bar', style:{ background:col } }),
                el('div', { style:{flex:1,minWidth:0} },
                  el('div', { className:'alert-msg' }, a.message),
                  el('div', { className:'alert-meta' },
                    el('span', { className:'badge badge-' + (a.severity==='critical'?'danger':a.severity==='info'?'trusted':'warn') }, (a.severity||'info').toUpperCase()),
                    '  ' + FMT.time(a.timestamp) + ' · ' + (a.device_ip || 'SYSTEM')
                  )
                ),
                !a.acked && el('button', { className:'ack-btn', onClick:()=>ackAlert(a) }, '✓ ACK')
              );
            })
          )
        ),

        // ══ NETWORK ══
        view === 'network' && el('div', { className:'panel pa-cyan' },
          el('div', { className:'panel-hdr' }, el('span', { className:'panel-title' }, 'Network Interfaces')),
          el('div', { className:'panel-body' },
            !status && el('div', { className:'empty' }, 'LOADING…'),
            status && el(React.Fragment, null,
              el('div', { className:'detail-row', style:{marginBottom:12} },
                el('div', { className:'detail-lbl' }, 'Scan Permissions'),
                el('div', { style:{marginTop:6} },
                  el('span', { className:`badge ${status.permissions?.has_raw_socket ? 'badge-trusted':'badge-warn'}` },
                    status.permissions?.has_raw_socket ? '✓ CAP_NET_RAW ACTIVE' : '⚠ LIMITED — ICMP ONLY'
                  ),
                  el('div', { style:{fontFamily:'var(--f-data)',fontSize:9.5,color:'var(--t2)',marginTop:5} },
                    status.permissions?.message || ''
                  )
                )
              ),
              (status.networks || []).map((n,i) => el('div', { key:i, className:'detail-row', style:{marginBottom:10} },
                el('div', { className:'detail-lbl' }, 'Interface: ' + n.interface),
                el('div', { style:{display:'flex',flexDirection:'column',gap:4,marginTop:6} },
                  [['Subnet', n.subnet], ['Local IP', n.ip||'—'], ['Gateway', n.gateway||'—']].map(([k,v]) =>
                    el('div', { key:k, style:{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--b1)'} },
                      el('span', { style:{fontFamily:'var(--f-hud)',fontSize:8,letterSpacing:2,color:'var(--t2)'} }, k),
                      el('span', { style:{fontFamily:'var(--f-data)',fontSize:10.5,color:'var(--t0)'} }, v)
                    )
                  )
                )
              ))
            )
          )
        ),

        // ══ SETTINGS ══
        view === 'settings' && el('div', { className:'row2' },
          el('div', { className:'panel pa-mint', style:{alignSelf:'start'} },
            el('div', { className:'panel-hdr' }, el('span', { className:'panel-title' }, 'System Configuration')),
            el('div', { className:'panel-body' },
              [
                { l:'UI Animations', sub:'Animated transitions and radar sweep', key:'animations' },
                { l:'Stealth Mode', sub:'Reduce active probing signatures', key:'stealth' },
              ].map(s => el('div', { key:s.key, className:'setting-row' },
                el('div', null,
                  el('div', { className:'setting-label' }, s.l),
                  el('div', { className:'setting-sub' }, s.sub)
                ),
                el('div', { className:`toggle${settings[s.key]?' on':''}`, onClick:()=>setSettings(p=>({...p,[s.key]:!p[s.key]})) })
              )),
              el('div', { className:'setting-row' },
                el('div', null,
                  el('div', { className:'setting-label' }, 'Scan Frequency'),
                  el('div', { className:'setting-sub' }, 'Auto-discovery interval')
                ),
                el('select', { className:'select-styled', value:settings.interval, onChange:e=>setSettings(p=>({...p,interval:e.target.value})) },
                  el('option',{value:'30'},'AGGRESSIVE — 30s'),
                  el('option',{value:'120'},'BALANCED — 2m'),
                  el('option',{value:'600'},'STEALTH — 10m')
                )
              )
            )
          ),
          el('div', { className:'panel pa-gold', style:{alignSelf:'start'} },
            el('div', { className:'panel-hdr' }, el('span', { className:'panel-title' }, 'System Info')),
            el('div', { className:'panel-body' },
              [
                { l:'Version',   v:'2.1.0 PRO' },
                { l:'Developer', v:'mintprojects' },
                { l:'Engine',    v:'Flask + SocketIO' },
                { l:'Database',  v:'SQLite ORM' },
                { l:'Protocol',  v:'ICMP + ARP + mDNS' },
              ].map(r => el('div', { key:r.l, style:{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--b1)'} },
                el('span', { style:{fontFamily:'var(--f-hud)',fontSize:8,letterSpacing:2,textTransform:'uppercase',color:'var(--t2)'} }, r.l),
                el('span', { style:{fontFamily:'var(--f-data)',fontSize:10.5,color:'var(--mint)'} }, r.v)
              )),
              el('div', { style:{marginTop:20} },
                el('button', { className:'btn btn-red', style:{width:'100%'}, onClick:()=>setShowExit(true) },
                  '⏻  SHUT DOWN SYSTEM'
                )
              )
            )
          )
        )

      ) // end main
    )   // end shell
  );    // end Fragment
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
